<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Redirecting...</title>
    <script type="text/javascript">
      // Redirect to the index.html with the full path
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.host + '/kaushal-s-portfolio/' + 
        l.pathname.substring('/kaushal-s-portfolio/'.length) + 
        (l.search || '') + (l.hash || '')
      );
    </script>
  </head>
  <body>
  </body>
</html>
