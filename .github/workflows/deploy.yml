name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1

      - name: Install dependencies
        working-directory: ./insightstream-labs-main
        run: bun install

      - name: Build
        working-directory: ./insightstream-labs-main
        run: bun run build
        env:
          GITHUB_PAGES: true
          VITE_FORMSPREE_ID: mqeoolja

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./insightstream-labs-main/dist
          publish_branch: gh-pages
          enable_jekyll: false
          force_orphan: true
