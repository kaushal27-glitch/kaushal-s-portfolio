name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1

      - name: Install dependencies
        working-directory: ./insightstream-labs-main
        run: bun install

      - name: Build
        working-directory: ./insightstream-labs-main
        run: bun run build
        env:
          GITHUB_PAGES: true
          VITE_FORMSPREE_ID: mqeoolja

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: './insightstream-labs-main/dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
